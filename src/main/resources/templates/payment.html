<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제하기</title>
  <script type="text/javascript" src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
  <script src="https://cdn.iamport.kr/v1/iamport.js"></script>
  <script type="text/javascript" src="https://cdn.iamport.kr/js/iamport.payment-1.2.0.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      padding: 40px 48px;
      width: 340px;
    }

    .card h2 {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      margin-bottom: 24px;
    }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin-bottom: 24px;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .item-row .label {
      color: #888;
    }

    .item-row .value {
      color: #111;
      font-weight: 500;
    }

    .btn-payment {
      margin-top: 32px;
      width: 100%;
      padding: 14px;
      background-color: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-payment:hover {
      background-color: #333;
    }

    .btn-mypage {
      display: block;
      margin-top: 12px;
      width: 100%;
      padding: 13px;
      background-color: #fff;
      color: #111;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background-color 0.2s;
    }

    .btn-mypage:hover {
      background-color: #f5f5f5;
    }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
    }

    .toast.success {
      background-color: #111;
    }

    .toast.error {
      background-color: #e53e3e;
    }
  </style>
</head>

<body>
<div class="card">
  <h2>결제 테스트</h2>
  <hr class="divider">
  <div class="item-row">
    <span class="label">상품명</span>
    <span class="value">테스트 상품</span>
  </div>
  <div class="item-row">
    <span class="label">금액</span>
    <span class="value">100원</span>
  </div>
  <button id="payment-button" class="btn-payment">구매하기</button>
  <a href="/payment/mypage" class="btn-mypage">결제 내역 보기</a>
</div>

<div id="toast" class="toast"></div>

<script th:inline="javascript">
  const impcode = [[${impCode}]];
  const useremail = [[${userEmail}]];
  const username = [[${userName}]];
</script>
<script type="text/javascript" th:src="@{/js/payment.js}"></script>
</body>
</html>
